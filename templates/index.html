<!DOCTYPE html>
<html>
<head>

<title>Lease Deed Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#f4f6fb;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
width:520px;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
margin-bottom:20px;
color:#1f2937;
}

.field{
margin-bottom:15px;
}

label{
font-size:13px;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
border:1px solid #d1d5db;
border-radius:6px;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="container">

<h2>Lease Deed Generator</h2>

<form action="/generate" method="post">

<div class="field">
<label>Lease Start Date</label>
<input type="date" name="start_date" required>
</div>

<div class="field">
<label>Lease Years</label>
<input type="number" name="lease_years" required>
</div>

<div class="field">
<label>Total SFT</label>
<input type="number" step="0.1" name="total_sft" required>
</div>

<div class="field">
<label>Rate Per SFT</label>
<input type="number" name="rate_per_sft" required>
</div>

<div class="field">
<label>Rent Enhancement (%)</label>
<input type="number" name="rent_enhancement" required>
</div>

<div class="field">
<label>Advance Amount</label>
<input type="number" name="advance_amount" required>
</div>

<div class="field">
<label>White Wash Cycle (Years)</label>
<input type="number" name="white_wash_years" required>
</div>

<button type="submit">
Generate Lease Document
</button>

</form>

</div>

</body>
</html>
